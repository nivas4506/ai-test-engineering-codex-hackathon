name: Kubernetes Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ai-test-engineering

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Prepare Kubernetes secrets
        run: |
          kubectl create namespace testdebugger --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n testdebugger create secret generic mysql-secret \
            --from-literal=MYSQL_ROOT_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}' \
            --from-literal=MYSQL_DATABASE='testdebugger' \
            --from-literal=MYSQL_USER='testdebugger' \
            --from-literal=MYSQL_PASSWORD='${{ secrets.MYSQL_APP_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n testdebugger create secret generic app-secret \
            --from-literal=DATABASE_URL='mysql+pymysql://testdebugger:${{ secrets.MYSQL_APP_PASSWORD }}@mysql:3306/testdebugger' \
            --from-literal=OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: |
          kubectl apply -k k8s
          kubectl -n testdebugger set image deployment/testdebugger-app app=${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n testdebugger rollout status deployment/testdebugger-app --timeout=240s
