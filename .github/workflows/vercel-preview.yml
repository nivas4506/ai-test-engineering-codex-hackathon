name: Vercel Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  deploy-preview:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./workspace/preview.db
        run: pytest

      - name: Install Vercel CLI
        run: npm install --global vercel@48.4.1

      - name: Pull preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview deployment
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        shell: pwsh
        run: |
          $url = vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          "deployment_url=$url" >> $env:GITHUB_OUTPUT

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Preview deployment: ${{ steps.deploy.outputs.deployment_url }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
